window.verDetalhesItem = function(itemCod, codUnidade, processoCompra, numContrato) {
    // Busca todos os empenhos do mesmo item + processo de compra + contrato
    const empenhosDoItem = dadosConsolidados.filter(d => {
        if (itemCod && d.item_despesa_codigo !== itemCod) return false;
        if (codUnidade && d.unidade_orcamentaria_codigo !== codUnidade) return false;
        if (processoCompra && d.numero_processo_compra_siad !== processoCompra) return false;
        if (numContrato && d._lic_numero_contrato && d._lic_numero_contrato !== numContrato) return false;
        return true;
    }).slice(0, 200);

    if (empenhosDoItem.length === 0) return;
    const ref = empenhosDoItem[0];
    const urlCompra = processoCompra ? gerarUrlComprasMG(processoCompra) : null;
    const editalUrl = ref._lic_edital_url || '';
    const contratoUrl = ref._lic_contrato_url || '';
    const urlFinalProcesso = urlCompra || editalUrl || '';

    // Aba Dados Gerais
    document.getElementById('itemModalContentDados').innerHTML = `
        <div style="background:#1a3a5c;color:white;padding:8px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;">
            <i class="material-icons" style="font-size:15px">inventory_2</i> Item de Despesa
        </div>
        <div style="background:#f8fafd;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 6px 6px;padding:14px;margin-bottom:10px;">
            <div class="row g-2">
                <div class="col-md-2"><div class="info-label">Cód. Item</div><div class="info-value" style="font-size:16px;font-weight:700;color:#1a3a5c;">${ref.item_despesa_codigo||'-'}</div></div>
                <div class="col-md-6"><div class="info-label">Descrição do Item</div><div class="info-value">${ref.item_despesa_descricao||'-'}</div></div>
                <div class="col-md-2"><div class="info-label">Cód. Elemento</div><div class="info-value">${ref.elemento_despesa_codigo||'-'}</div></div>
                <div class="col-md-2"><div class="info-label">Elemento Despesa</div><div class="info-value">${ref.elemento_despesa_descricao||'-'}</div></div>
                <div class="col-md-5"><div class="info-label">Órgão</div><div class="info-value">${ref.unidade_orcamentaria_codigo?'['+ref.unidade_orcamentaria_codigo+'] ':''} ${ref.unidade_orcamentaria_nome||'-'}</div></div>
                <div class="col-md-4"><div class="info-label">Modalidade de Licitação</div><div class="info-value">${ref.licitacao_descricao_da_modalidade||'-'}</div></div>
                <div class="col-md-3"><div class="info-label">Qtd. Empenhos</div><div class="info-value">${empenhosDoItem.length.toLocaleString('pt-BR')}</div></div>
            </div>
        </div>
        <div style="background:#20445d;color:white;padding:8px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:6px;">
            <i class="material-icons" style="font-size:15px">account_balance_wallet</i> Valores Totais
        </div>
        <div style="background:#f8fafd;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 6px 6px;padding:14px;margin-bottom:8px;">
            <div class="row g-2">
                <div class="col-md-4"><div class="info-label">Total Empenhado</div><div class="info-value" style="font-size:15px;font-weight:700;color:#1a3a5c;">${formatarMoeda(empenhosDoItem.reduce((s,d)=>s+d.valor_despesa_empenhada,0))}</div></div>
                <div class="col-md-4"><div class="info-label">Total Liquidado</div><div class="info-value" style="font-size:15px;font-weight:700;color:#856404;">${formatarMoeda(empenhosDoItem.reduce((s,d)=>s+d.valor_despesa_liquidada,0))}</div></div>
            </div>
        </div>`;

    // Aba Processo de Compra
    if (processoCompra && ref._lic_procedimento_grupo || ref.objeto_processo) {
        document.getElementById('itemModalContentCompra').innerHTML = `
        <div style="background:#1a3a5c;color:white;padding:8px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;">
            <i class="material-icons" style="font-size:15px">gavel</i> Dados da Licitação / Processo de Compra
        </div>
        <div style="background:#f8fafd;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 6px 6px;padding:14px;margin-bottom:8px;">
            <div class="row g-2">
                <div class="col-md-4"><div class="info-label">Nº Processo Compra (SIAD)</div>
                    <div class="info-value">${urlFinalProcesso?`<a href="${urlFinalProcesso}" target="_blank" class="compra-link">${processoCompra} <i class="material-icons" style="font-size:13px">open_in_new</i></a>`:(processoCompra||'-')}</div>
                </div>
                <div class="col-md-4"><div class="info-label">Nº Contrato</div>
                    <div class="info-value">${numContrato&&contratoUrl?`<a href="${contratoUrl}" target="_blank" class="compra-link">${numContrato} <i class="material-icons" style="font-size:13px">open_in_new</i></a>`:(numContrato||'-')}</div>
                </div>
                <div class="col-md-4"><div class="info-label">Situação</div><div class="info-value">${ref._lic_situacao_processo||'-'}</div></div>
                <div class="col-12"><div class="info-label">Objeto</div>
                    <div class="info-value" style="background:#fff;border:1px solid #e2e8f0;border-radius:4px;padding:6px 10px;font-size:12px;line-height:1.5;">${ref.objeto_processo||'-'}</div>
                </div>
                <div class="col-md-3"><div class="info-label">Modalidade / Grupo</div><div class="info-value">${ref._lic_procedimento_grupo||ref.licitacao_descricao_da_modalidade||'-'}</div></div>
                <div class="col-md-3"><div class="info-label">Detalhamento</div><div class="info-value">${ref._lic_procedimento_det1||'-'}</div></div>
                <div class="col-md-3"><div class="info-label">Especialização</div><div class="info-value">${ref._lic_procedimento_esp||'-'}</div></div>
                <div class="col-md-3"><div class="info-label">Critério de Julgamento</div><div class="info-value">${ref._lic_criterio_julgamento||'-'}</div></div>
                <div class="col-md-4"><div class="info-label">Órgão Comprador</div><div class="info-value">${ref._lic_nome_orgao||'-'}</div></div>
                <div class="col-md-2"><div class="info-label">Ano Criação</div><div class="info-value">${ref._lic_ano_criacao_pedido||'-'}</div></div>
                <div class="col-md-3"><div class="info-label">Valor Referência</div><div class="info-value">${ref._lic_valor_referencia?formatarMoeda(ref._lic_valor_referencia):'-'}</div></div>
                <div class="col-md-3"><div class="info-label">Valor Homologado</div><div class="info-value">${ref._lic_valor_homologado?formatarMoeda(ref._lic_valor_homologado):'-'}</div></div>
                ${editalUrl?`<div class="col-md-6"><div class="info-label">Edital</div><div class="info-value"><a href="${editalUrl}" target="_blank" class="btn-pesquisa" style="font-size:11px;height:28px;padding:0 10px;"><i class="material-icons" style="font-size:13px">description</i> Acessar Edital</a></div></div>`:''}
                ${contratoUrl&&numContrato?`<div class="col-md-6"><div class="info-label">Contrato</div><div class="info-value"><a href="${contratoUrl}" target="_blank" class="btn-pesquisa" style="font-size:11px;height:28px;padding:0 10px;"><i class="material-icons" style="font-size:13px">article</i> Acessar Contrato</a></div></div>`:''}
            </div>
        </div>`;
    } else {
        document.getElementById('itemModalContentCompra').innerHTML = `<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:16px;margin:10px 0;font-size:13px;color:#795548;text-align:center;"><i class="material-icons" style="font-size:36px;display:block;margin-bottom:8px;color:#ffc107;">info</i>Este item não possui processo de compra vinculado no dataset de licitações.</div>`;
    }

    // Aba Empenhos e Pagamentos - cada empenho com seus pagamentos
    const totalEmpItem = empenhosDoItem.reduce((s,d)=>s+d.valor_despesa_empenhada,0);
    const totalLiqItem = empenhosDoItem.reduce((s,d)=>s+d.valor_despesa_liquidada,0);

    const empenhosHtmlItem = empenhosDoItem.map((e) => {
        const pagsDoEmpenho = dadosPagamentos.filter(p => {
            if (String(p['numero_empenho']||'').trim() !== String(e.numero_empenho)) return false;
            if (String(p['unidade_orcamentaria_codigo']||'').trim() !== String(e.unidade_orcamentaria_codigo)) return false;
            if (e.razao_social_credor && p['razao_social_credor'] && p['razao_social_credor'] !== e.razao_social_credor) return false;
            if (e.numero_processo_compra_siad && p['numero_processo_compra_siad'] && p['numero_processo_compra_siad'] !== e.numero_processo_compra_siad) return false;
            if (e._lic_numero_contrato && p['_lic_numero_contrato'] && p['_lic_numero_contrato'] !== e._lic_numero_contrato) return false;
            return true;
        }).slice(0, 100);
        const totPagF = pagsDoEmpenho.reduce((s,p)=>s+parsearValorMonetario(p['valor_pago_financeiro']),0);
        const totPagP = pagsDoEmpenho.reduce((s,p)=>s+parsearValorMonetario(p['valor_pago_processado']),0);
        const totPagNP = pagsDoEmpenho.reduce((s,p)=>s+parsearValorMonetario(p['valor_pago_nao_processado']),0);

        const pagHtml = pagsDoEmpenho.length > 0 ? `
            <div style="margin:6px 0 0 0;border-left:3px solid #3a6186;border-radius:0 6px 6px 6px;overflow:hidden;">
                <div style="background:#3a6186;color:white;padding:5px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;">
                    <i class="material-icons" style="font-size:13px">payments</i> Pagamentos do Empenho ${e.numero_empenho}
                    <span style="margin-left:auto;background:rgba(255,255,255,0.25);padding:1px 8px;border-radius:8px;font-size:10px;">${pagsDoEmpenho.length} registro(s)</span>
                </div>
                <div style="overflow:auto;max-height:200px;background:#f5f8fb;">
                    <table style="width:100%;border-collapse:collapse;font-size:11px;">
                        <thead><tr>
                            <th style="background:#3a6186;color:white;padding:6px 8px;font-size:10px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;">Ano</th>
                            <th style="background:#3a6186;color:white;padding:6px 8px;font-size:10px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;">Data</th>
                            <th style="background:#3a6186;color:white;padding:6px 8px;font-size:10px;text-transform:uppercase;text-align:right;white-space:nowrap;position:sticky;top:0;">Pago Financeiro</th>
                            <th style="background:#3a6186;color:white;padding:6px 8px;font-size:10px;text-transform:uppercase;text-align:right;white-space:nowrap;position:sticky;top:0;">Pago Proc. RP</th>
                            <th style="background:#3a6186;color:white;padding:6px 8px;font-size:10px;text-transform:uppercase;text-align:right;white-space:nowrap;position:sticky;top:0;">Pago Não Proc. RP</th>
                        </tr></thead>
                        <tbody>
                            ${pagsDoEmpenho.map((p,pi)=>`
                            <tr style="background:${pi%2===0?'#fff':'#f0f4f8'};">
                                <td style="padding:5px 8px;border-bottom:1px solid #dde9f5;">${p['ano_empenho']||p['ano_de_exercicio']||'-'}</td>
                                <td style="padding:5px 8px;border-bottom:1px solid #dde9f5;white-space:nowrap;">${formatarData(p['data_registro_doc_empenho'])}</td>
                                <td style="padding:5px 8px;border-bottom:1px solid #dde9f5;text-align:right;color:#1a3a5c;font-weight:600;">${formatarMoeda(p['valor_pago_financeiro'])}</td>
                                <td style="padding:5px 8px;border-bottom:1px solid #dde9f5;text-align:right;">${formatarMoeda(p['valor_pago_processado'])}</td>
                                <td style="padding:5px 8px;border-bottom:1px solid #dde9f5;text-align:right;">${formatarMoeda(p['valor_pago_nao_processado'])}</td>
                            </tr>`).join('')}
                        </tbody>
                        <tfoot><tr style="background:#dde7f0;font-weight:700;">
                            <td colspan="2" style="padding:5px 8px;font-size:11px;">TOTAL</td>
                            <td style="padding:5px 8px;text-align:right;color:#1a3a5c;">${formatarMoeda(totPagF)}</td>
                            <td style="padding:5px 8px;text-align:right;">${formatarMoeda(totPagP)}</td>
                            <td style="padding:5px 8px;text-align:right;">${formatarMoeda(totPagNP)}</td>
                        </tr></tfoot>
                    </table>
                </div>
            </div>` : `<div style="color:#795548;font-size:11px;padding:4px 8px;margin-top:4px;font-style:italic;"><i class="material-icons" style="font-size:12px;vertical-align:middle;">info</i> Nenhum pagamento encontrado para este empenho.</div>`;

        return `
        <div style="background:#f8fafd;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
                <span style="font-size:13px;font-weight:700;color:#1a3a5c;">Empenho ${e.numero_empenho||'-'}</span>
                <span style="font-size:11px;color:#64748b;">Ano: ${e.ano_empenho||'-'} | ${formatarData(e.data_registro_doc_empenho)}</span>
                <span style="font-size:11px;color:#64748b;margin-left:auto;">Credor: <strong>${e.razao_social_credor||'-'}</strong></span>
            </div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;padding-bottom:6px;border-bottom:1px solid #dee2e6;">
                <span>Empenhado: <strong style="color:#1a3a5c;">${formatarMoeda(e.valor_despesa_empenhada)}</strong></span>
                <span>Liquidado: <strong style="color:#856404;">${formatarMoeda(e.valor_despesa_liquidada)}</strong></span>
            </div>
            ${pagHtml}
        </div>`;
    }).join('');

    const labelItem = processoCompra
        ? (numContrato ? `Empenhos — Item <strong>${itemCod}</strong> / Processo <strong>${processoCompra}</strong> / Contrato <strong>${numContrato}</strong>` : `Empenhos — Item <strong>${itemCod}</strong> / Processo <strong>${processoCompra}</strong>`)
        : `Empenhos com Item <strong>${itemCod}</strong>`;

    document.getElementById('itemModalContentEmpenhos').innerHTML = `
        <div style="background:#1a3a5c;color:white;padding:8px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:10px;">
            <i class="material-icons" style="font-size:15px">receipt_long</i> ${labelItem}
            <span style="margin-left:auto;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:10px;font-size:11px;">${empenhosDoItem.length} empenho(s)</span>
        </div>
        <div style="padding:0 2px;">
            <div style="display:flex;gap:20px;background:#f0f4f8;border-radius:6px;padding:8px 14px;margin-bottom:10px;font-size:12px;flex-wrap:wrap;">
                <span>Total Empenhado: <strong style="color:#1a3a5c;">${formatarMoeda(totalEmpItem)}</strong></span>
                <span>Total Liquidado: <strong style="color:#856404;">${formatarMoeda(totalLiqItem)}</strong></span>
            </div>
            ${empenhosHtmlItem}
        </div>`;

    // Reset to first tab
    const firstTab = document.getElementById('item-modal-dados-tab');
    if (firstTab) new bootstrap.Tab(firstTab).show();

    new bootstrap.Modal(document.getElementById('itemDetailModal'), {
        backdrop: true, keyboard: true, focus: false
    }).show();
    setTimeout(() => {
        try { document.getElementById('itemDetailModal').removeAttribute('tabindex'); } catch(e) {}
    }, 50);
};

// Reset item modal tabs on open — integrado no bloco unificado de scroll fix abaixo
document.addEventListener('show.bs.modal', function(e) {
    if (e.target.id === 'itemDetailModal') {
        const tab = document.getElementById('item-modal-dados-tab');
        if (tab) new bootstrap.Tab(tab).show();
    }
});

document.addEventListener('DOMContentLoaded', () => {
    carregarDados();
    document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tab => {
        tab.addEventListener('shown.bs.tab', () => setTimeout(iframeUpdateHeight, 300));
    });
    window.addEventListener('resize', () => { clearTimeout(window.resizeTimer); window.resizeTimer = setTimeout(iframeUpdateHeight, 250); });
});

(function() {
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
        try { if(window.parent&&window.parent!==window) window.parent.postMessage({iframeHeight:h,iframeResize:true,type:'resize'},'*'); } catch(e) {}
    }
    if (window.ResizeObserver) new ResizeObserver(sendHeight).observe(document.body);
    else { window.addEventListener('resize', sendHeight); setInterval(sendHeight, 2000); }
    sendHeight();
})();
</script>
</body>
</html>
