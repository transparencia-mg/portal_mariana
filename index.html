}

function atualizarTabelaREC() {
    const data = window.receitaFiltradaView||[];
    const ini  = (pagReceita.atual-1)*pagReceita.porPag;
    const fim  = Math.min(ini+pagReceita.porPag, data.length);
    const rows = data.slice(ini, fim);
    const tbody = document.getElementById('tbodyReceita');
    if(!tbody) return;

    tbody.innerHTML = rows.length===0
        ? '<tr><td colspan="11" class="text-center py-4">Nenhum registro encontrado</td></tr>'
        : rows.map(_linhaREC).join('');

    // Totais — valores já são numéricos após agrupamento
    const tot = data.reduce((acc,r)=>{
        acc.prev_ini += (typeof r.valor_previsto_inicial   ==='number') ? r.valor_previsto_inicial   : parseNum(r.valor_previsto_inicial);
        acc.prev_atu += (typeof r.valor_previsto_atualizado==='number') ? r.valor_previsto_atualizado : parseNum(r.valor_previsto_atualizado);
        acc.contab   += (typeof r.valor_contabilizado      ==='number') ? r.valor_contabilizado       : parseNum(r.valor_contabilizado);
        acc.arrec    += (typeof r.valor_arrecadado_liquido ==='number') ? r.valor_arrecadado_liquido  : parseNum(r.valor_arrecadado_liquido);
        return acc;
    },{prev_ini:0, prev_atu:0, contab:0, arrec:0});

    const tfoot = document.getElementById('tfootReceita');
    if(tfoot) tfoot.innerHTML=`
        <td colspan="6"><strong>TOTAL (${data.length} registros)</strong></td>
        <td class="text-right"><strong>${formatarMoeda(tot.prev_ini)}</strong></td>
        <td class="text-right"><strong>${formatarMoeda(tot.prev_atu)}</strong></td>
        <td class="text-right"><strong>${formatarMoeda(tot.contab)}</strong></td>
        <td class="text-right"><strong>${formatarMoeda(tot.arrec)}</strong></td>
        <td></td>`;

    const badge = document.getElementById('badgeREC');
    if(badge) badge.textContent = data.length+' registros';

    // Paginação
    const pgCont = document.getElementById('pagContainerREC');
    if(pgCont){
        if(pagReceita.total<=1){pgCont.innerHTML='';return;}
        let h=`<div class="pagination-info"><span>Mostrando ${ini+1}–${fim} de ${data.length}</span></div>`;
        h+=`<div class="pagination-controls">
            <button onclick="mudaPagREC(${pagReceita.atual-1})" ${pagReceita.atual===1?'disabled':''}><i class="fas fa-angle-left"></i></button>`;
        for(let i=Math.max(1,pagReceita.atual-2);i<=Math.min(pagReceita.total,pagReceita.atual+2);i++)
            h+=`<button onclick="mudaPagREC(${i})" class="${i===pagReceita.atual?'active':''}">${i}</button>`;
        h+=`<button onclick="mudaPagREC(${pagReceita.atual+1})" ${pagReceita.atual===pagReceita.total?'disabled':''}><i class="fas fa-angle-right"></i></button></div>`;
        pgCont.innerHTML=h;
    }
}

window.mudaPagREC    = function(p){ if(p<1||p>pagReceita.total)return; pagReceita.atual=p; atualizarTabelaREC(); };
window.aplicarFiltrosREC = function(){ calcularTabelaREC(); };
window.limparFiltrosREC  = function(){
    ['filtroClassifREC','filtroUOREC','filtroTipoREC']
        .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    const selInic = document.getElementById('filtroMesInicREC');
    if (selInic) selInic.value = '01';
    // Recalcula o último mês disponível para o ano selecionado
    const anoSel = (document.getElementById('filtroAnoREC')?.value||'').trim();
    const selFim = document.getElementById('filtroMesFimREC');
    if (selFim && anoSel) {
        const meses = [...new Set([...dadosReceita,...dadosContaBancaria]
            .filter(r=>{ const k=Object.keys(r).find(k2=>_limpar(k2).toLowerCase().includes('ano')); return k&&_limpar(r[k])===anoSel; })
            .map(r=>{ const k=Object.keys(r).find(k2=>_limpar(k2).toLowerCase().includes('mes')); const raw=k?_limpar(r[k]):''; return _mesDescritivoParaNum(raw)||raw.padStart(2,'0'); })
            .filter(m=>m&&m!=='00'))].sort();
        selFim.value = meses[meses.length-1] || '12';
    } else if (selFim) { selFim.value = '12'; }
    calcularTabelaREC();
};
window.sortREC = function(col){
    if(sortCfgReceita.col===col) sortCfgReceita.dir=sortCfgReceita.dir==='asc'?'desc':'asc';
    else{sortCfgReceita.col=col;sortCfgReceita.dir='asc';}
    window.receitaFiltradaView=ordenarREC(window.receitaFiltradaView||[], sortCfgReceita.col, sortCfgReceita.dir);
    pagReceita.atual=1; atualizarTabelaREC();
};
window.buscarREC = function(termo){
    const t=(termo||'').toLowerCase().trim();
    if(!t){atualizarTabelaREC();return;}
    const f=(window.receitaFiltradaView||[]).filter(r=>
        (r.ano_de_exercicio||'').includes(t)||
        (r.unidade_orcamentaria_codigo||'').toLowerCase().includes(t)||
        (r.unidade_orcamentaria_nome||'').toLowerCase().includes(t)||
        (r.classificacao_receita_formatado||'').toLowerCase().includes(t)||
        (r.classificacao_receita_descricao||'').toLowerCase().includes(t)
    );
    const tbody=document.getElementById('tbodyReceita');
    if(!tbody) return;
    tbody.innerHTML = f.slice(0,pagReceita.porPag).map(_linhaREC).join('');
    if(document.getElementById('badgeREC')) document.getElementById('badgeREC').textContent=f.length+' registros';
};
window.exportarReceitaCSV = function(){
    const campos=['ano_de_exercicio','periodo_desc','unidade_orcamentaria_codigo','unidade_orcamentaria_nome',
        'classificacao_receita_formatado','classificacao_receita_descricao',
        'valor_previsto_inicial','valor_previsto_atualizado','valor_contabilizado','valor_arrecadado_liquido','_tipo_linha'];
    const headers=['Ano','Período','Cód. UO','Unidade Orçamentária','Cód. Classificação','Classificação da Receita',
        'Vl. Prev. Inicial','Vl. Prev. Atualizado','Vl. Contabilizado','Vl. Arrecadado Líq.','Tipo'];
    const data=window.receitaFiltradaView||[];
    const csv=[headers.join(';'),...data.map(r=>campos.map(c=>{
        const v = r[c];
        return `"${(typeof v==='number' ? v.toFixed(2).replace('.',',') : (v||''))}"`; 
    }).join(';'))].join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='receita.csv'; a.click();
};
window.exportarReceitaPDF = function(){
    const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'landscape'});
    doc.autoTable({
        head:[['Ano','Período','Cód. UO','Unidade Orçamentária','Cód. Classif.','Classificação da Receita',
               'Vl. Prev. Inicial','Vl. Prev. Atualizado','Vl. Contabilizado','Vl. Arrecadado Líq.','Tipo']],
        body:(window.receitaFiltradaView||[]).slice(0,150).map(r=>[
            r.ano_de_exercicio||'-',
            r.periodo_desc||'-',
            r.unidade_orcamentaria_codigo||'-',
            (r.unidade_orcamentaria_nome||'-').substring(0,25),
            r.classificacao_receita_formatado||'-',
            (r.classificacao_receita_descricao||'-').substring(0,30),
            formatarMoeda(r.valor_previsto_inicial),
            formatarMoeda(r.valor_previsto_atualizado),
            formatarMoeda(r.valor_contabilizado),
            formatarMoeda(r.valor_arrecadado_liquido),
            r._tipo_linha==='contabancaria'?'Conta Bancária':'Receita Orç.'
        ]),
        headStyles:{fillColor:[32,68,93]}, styles:{fontSize:6.5},
        didDrawPage:()=>{doc.setFontSize(9);doc.text('Receita - Acordo de Mariana',14,10);doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')}`,14,doc.internal.pageSize.height-5);}
    });
    doc.save('receita.pdf');
};

    else { window.addEventListener('resize',sendH); setInterval(sendH,2000); }

})();
